<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local FSAE RAG</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>Local FSAE RAG</h1>
        <p id="statusLine">Checking local index...</p>
      </div>
      <nav class="tabs" aria-label="Views">
        <button class="tab active" data-tab-target="upload">Upload</button>
        <button class="tab" data-tab-target="index">Index</button>
        <button class="tab" data-tab-target="chat">Chat</button>
      </nav>
    </header>

    <main>
      <section id="upload" class="panel active">
        <div class="toolbar">
          <input id="fileInput" type="file" accept="application/pdf,.pdf" multiple />
          <button id="uploadButton" type="button">Upload + index</button>
          <button id="reindexButton" type="button">Reindex</button>
        </div>
        <div id="uploadStatus" class="status"></div>
        <div class="toolbar">
          <input id="pdfSearchInput" type="search" placeholder="Search PDFs by title or hash" />
          <button id="pdfSearchButton" type="button">Search PDFs</button>
        </div>
        <table class="data-table pdf-table">
          <thead>
            <tr>
              <th>PDF</th>
              <th>Status</th>
              <th>Download</th>
            </tr>
          </thead>
          <tbody id="pdfsBody"></tbody>
        </table>
        <table class="data-table">
          <thead>
            <tr>
              <th>Job</th>
              <th>Status</th>
              <th>Phase</th>
              <th>Files</th>
              <th>Error</th>
            </tr>
          </thead>
          <tbody id="jobsBody"></tbody>
        </table>
      </section>

      <section id="index" class="panel">
        <div class="toolbar">
          <input id="searchInput" type="search" placeholder="Search index" />
          <button id="searchButton" type="button">Search</button>
          <label class="inline-select-label">
            Rows
            <select id="indexPageSizeSelect">
              <option value="20" selected>20</option>
              <option value="50">50</option>
              <option value="100">100</option>
              <option value="all">All</option>
            </select>
          </label>
          <button id="prevPageButton" type="button">Prev</button>
          <span id="pageLabel"></span>
          <button id="nextPageButton" type="button">Next</button>
        </div>
        <div id="indexStatus" class="status"></div>
        <table class="data-table index-table">
          <thead>
            <tr>
              <th>Source</th>
              <th>Content</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="indexBody"></tbody>
        </table>
      </section>

      <section id="chat" class="panel chat-panel">
        <div id="chatLayout" class="chat-layout">
          <aside id="chatSidebar" class="chat-sidebar" aria-label="Saved chats">
            <div class="chat-sidebar-header">
              <strong>Chats</strong>
              <button id="collapseChatSidebarButton" type="button">Hide</button>
            </div>
            <button id="newChatButton" type="button">New chat</button>
            <div id="savedChatsList" class="saved-chats-list"></div>
          </aside>
          <div class="chat-main">
            <div class="chat-main-toolbar">
              <button id="expandChatSidebarButton" type="button" hidden>Chats</button>
            </div>
            <div id="chatMessages" class="chat-messages" aria-live="polite"></div>
            <form id="chatForm" class="chat-form">
              <div class="sampler-settings" aria-label="Sampler settings">
                <label>
                  Temperature
                  <input id="temperatureInput" type="number" min="0" max="2" step="0.05" value="0.9" />
                </label>
                <label>
                  Max K
                  <input id="maxKInput" type="number" min="1" max="200" step="1" value="40" />
                </label>
                <label>
                  Context
                  <input id="contextWindowInput" type="number" min="1024" max="131072" step="1024" value="100352" />
                </label>
                <label>
                  Max Output
                  <input id="maxOutputInput" type="number" min="64" max="32768" step="64" value="20032" />
                </label>
                <label class="checkbox-label">
                  Web search
                  <input id="webSearchInput" type="checkbox" checked />
                </label>
              </div>
              <textarea id="questionInput" rows="3" placeholder="Ask a question"></textarea>
              <button id="sendButton" type="submit">Send</button>
            </form>
          </div>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
