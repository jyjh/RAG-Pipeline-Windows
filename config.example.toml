[paths]
data_dir = "data"
processed_dir = "processed_docs"
db_dir = "db"
asset_dir = "db/assets"

[models]
llm_model = "gemma4"
vision_model = "qwen2.5vl:7b"
embedding_model = "nomic-embed-text"
reranker_model = ""
embedding_dim = 768

[ingestion]
ocr_backend = "tesseract_cli"
ocr_strategy = "auto"
vision_enabled = true
figure_crop_enabled = true
formula_enrichment = false
table_structure = true
accelerator = "auto"
num_threads = 8
asset_triggers = "none"
progress_enabled = true

[chunking]
max_tokens = 900
overlap_tokens = 120
adjacent_block_window = 1
summary_mode = "hybrid"
index_backend = "lancedb"

[retrieval]
top_k = 8
vector_top_k = 24
bm25_top_k = 24
rrf_k = 60
rerank_top_k = 12
min_relevance_score = 0.36
relative_relevance_cutoff = 0.72
candidate_top_k = 80
context_token_fraction = 0.60

[web_search]
enabled = true
provider = "duckduckgo_lite"
timeout_seconds = 8.0
max_results = 5

[server]
host = "127.0.0.1"
port = 8000
lan = false
api_token = ""
health_poll_interval_ms = 60000
jobs_poll_interval_ms = 60000
