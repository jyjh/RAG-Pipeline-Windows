[paths]
data_dir = "data"
processed_dir = "processed_docs"
db_dir = "db"
asset_dir = "db/assets"

[models]
llm_model = "deepseek-r1:32b"
vision_model = "qwen2.5vl:7b"
embedding_model = "nomic-ai/nomic-embed-text-v1.5"
reranker_model = ""
embedding_dim = 768
allow_hash_embeddings = true

[ingestion]
ocr_backend = "tesseract_cli"
ocr_strategy = "auto"
vision_enabled = true
figure_crop_enabled = true
formula_enrichment = false
table_structure = true
accelerator = "cuda"
num_threads = 8

[chunking]
max_tokens = 900
overlap_tokens = 120
adjacent_block_window = 1

[retrieval]
top_k = 8
vector_top_k = 24
bm25_top_k = 24
rrf_k = 60
rerank_top_k = 12

[server]
host = "127.0.0.1"
port = 8000
lan = false
api_token = ""

