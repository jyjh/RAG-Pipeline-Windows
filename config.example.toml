[paths]
data_dir = "data"
processed_dir = "processed_docs"
db_dir = "db"
asset_dir = "db/assets"

[models]
llm_model = "gemma4"
vision_model = "qwen2.5vl:7b"
embedding_model = "nomic-embed-text"
reranker_model = ""
embedding_dim = 768

[ingestion]
ocr_backend = "rapidocr"
ocr_langs = ["english"]
ocr_force_full_page = true
ocr_bitmap_area_threshold = 0.05
rapidocr_backend = "onnxruntime"
tesseract_cmd = "tesseract"
tesseract_data_path = ""
tesseract_psm = 3
ocr_strategy = "auto"
vision_enabled = true
figure_crop_enabled = true
code_enrichment = true
formula_enrichment = true
table_structure = true
accelerator = "auto"
num_threads = 8
asset_triggers = "auto"
progress_enabled = true
# Number of parallel worker processes for PDF ingestion. Each worker loads its
# own copy of the Docling/OCR models, so this trades throughput for VRAM. 1 =
# serial (safe default). Set to 2-4 on a GPU with headroom for a large corpus.
ingestion_workers = 1
# Above this page count, Docling parsing switches to a page-at-a-time path to
# bound memory (the whole-document path materializes the full Docling model +
# OCR state in RAM and OOMs on a multi-thousand-page scanned book). 0 = never
# force (always use the whole-document path when progress is disabled).
max_pages_whole_doc = 50

[chunking]
max_tokens = 900
overlap_tokens = 120
adjacent_block_window = 1
summary_mode = "hybrid"
index_backend = "lancedb"

# Approximate-nearest-neighbour (ANN) vector index. Below ann_min_rows the
# table uses a flat (brute-force) scan which is faster for small corpora; above
# it, an IVF_PQ index makes every query sublinear. These defaults are tuned for
# nomic-embed-text (768-dim, L2-normalized vectors).
[indexing]
ann_min_rows = 50000
ann_nprobes = 20
ann_refine_factor = 10

[uploads]
# Per-file and per-corpus size caps in bytes (0 = unlimited). Set these on a
# shared deployment to prevent one upload from exhausting disk.
max_upload_bytes = 0
max_corpus_bytes = 0
# Chunk size for the resumable chunked-upload endpoint (large single files).
chunk_bytes = 16777216

[retrieval]
top_k = 8
vector_top_k = 24
bm25_top_k = 24
rrf_k = 60
rerank_top_k = 12
min_relevance_score = 0.50
relative_relevance_cutoff = 0.72
candidate_top_k = 80
context_token_fraction = 0.60

[web_search]
enabled = true
provider = "duckduckgo_lite"
timeout_seconds = 8.0
max_results = 5

[ollama]
chat_health_check_interval_seconds = 5.0
chat_max_lost_health_checks = 5

[chat]
context_window = 8192
llm_num_predict = 4096
planner_model = "qwen2.5:1.5b"
planner_enabled = true
planner_max_queries = 3
system_prompt = """You are a retrieval-augmented assistant. Before answering, you must call search_local_context at least once. You may call search_local_context again with a narrower query when more evidence is needed. {web_instruction} Use only information returned by tools. In the final answer, cite every factual claim with source IDs exactly as provided, such as [S1] or [W1]. If the available sources are insufficient, say what is missing."""

[server]
host = "127.0.0.1"
port = 8000
bind_all = false
api_token = ""
update_remote = "origin"
update_branch = "main"
health_poll_interval_ms = 60000
jobs_poll_interval_ms = 60000
background_worker_threads = 2
# Multiplier applied to the estimated peak disk footprint of an index build
# (staged index + publish backup + corpus) before the pre-build disk-space
# check refuses to start. 1.15 = 15% headroom.
disk_safety_factor = 1.15
# Number of parallel job-worker threads. 1 = serial (safe default). With >1,
# ingestion-only phases of different upload jobs run concurrently; index-mutating
# phases (indexing, backup, restore, rebuild) are serialized internally so only
# one writes to db/ at a time. Each ingestion worker loads its own parser models.
job_workers = 1
